version: 2
updates:
  # Dependencias de Gradle (libs.versions.toml)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      androidx:
        patterns:
          - "androidx.*"
      compose:
        patterns:
          - "androidx.compose.*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin.*"
    ignore:
      # Ignorar major versions (pueden tener breaking changes)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Dependencias de GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
